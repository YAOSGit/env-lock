name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run with secrets
        working-directory: examples/integration/environments/staging
        env:
          ENV_LOCK_PASSWORD: ${{ secrets.ENV_LOCK_PASSWORD_STAGING }}
        run: env-lock run -- node ../../app.js

  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run with secrets
        working-directory: examples/integration/environments/prod
        env:
          ENV_LOCK_PASSWORD: ${{ secrets.ENV_LOCK_PASSWORD_PROD }}
        run: env-lock run -- node ../../app.js
